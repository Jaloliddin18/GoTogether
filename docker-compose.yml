services:
  goTogether-api:
    container_name: goTogether-api
    restart: always
    image: node:20.19.5
    ports:
      - 4003:3007
    volumes:
      - ./:/usr/src/goTogether
    working_dir: /usr/src/goTogether

    networks:
      - monorepo-network

    command: sh -c "npm install && npm run build && npm run start:prod"

  goTogether-batch:
    container_name: goTogether-batch
    restart: unless-stopped
    image: node:20.19.5
    ports:
      - 4004:3008
    volumes:
      - ./:/usr/src/goTogether
    working_dir: /usr/src/goTogether

    networks:
      - monorepo-network

    command: sh -c "npm install && npm run build:batch && npm run start:prod:batch"

networks:
  monorepo-network:
    driver: bridge
